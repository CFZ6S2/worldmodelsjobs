<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Access | WorldModels & Jobs</title>
    <meta name="description" content="Accede al feed de inteligencia premium para modelos y agencias. Plazas, eventos y castings en tiempo real.">
    <link rel="stylesheet" href="/styles-v6.css?v=9.2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── LOGIN PAGE PREMIUM OVERRIDES ── */
        .auth-body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glow blobs */
        .auth-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
        }
        .auth-blob--gold {
            width: 420px; height: 420px;
            background: radial-gradient(circle, #d4af37, transparent 70%);
            top: -80px; right: -80px;
        }
        .auth-blob--purple {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #6b21a8, transparent 70%);
            bottom: 40px; left: -60px;
        }

        /* Card */
        .auth-card-premium {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 32px 36px;
            background: rgba(18, 18, 18, 0.92);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 24px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            animation: authCardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes authCardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Crown icon */
        .auth-crown-ring {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
            border: 1px solid rgba(212,175,55,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: #d4af37;
        }

        /* Brand */
        .auth-brand {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #fff;
            text-align: center;
            margin: 0 0 4px;
        }
        .auth-brand span { color: #d4af37; }

        .auth-tagline {
            text-align: center;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(212,175,55,0.7);
            text-transform: uppercase;
            margin: 0 0 28px;
        }

        /* Tabs */
        .auth-tabs-premium {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }
        .auth-tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .auth-tab-btn.active {
            background: linear-gradient(135deg, #d4af37, #f5c842);
            color: #000;
            box-shadow: 0 4px 12px rgba(212,175,55,0.35);
        }

        /* Form */
        .auth-field {
            margin-bottom: 16px;
        }
        .auth-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            box-sizing: border-box;
        }
        .auth-input::placeholder { color: rgba(255,255,255,0.2); }
        .auth-input:focus {
            border-color: rgba(212,175,55,0.5);
            background: rgba(212,175,55,0.04);
        }

        /* Submit button */
        .auth-submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #f5c842 50%, #d4af37 100%);
            background-size: 200% auto;
            color: #000;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-position 0.4s ease, transform 0.15s ease, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(212,175,55,0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .auth-submit-btn:hover {
            background-position: right center;
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(212,175,55,0.45);
        }
        .auth-submit-btn:active { transform: translateY(0); }
        .auth-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Footer text */
        .auth-footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }

        /* Error toast inline */
        .auth-error-msg {
            display: none;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: #f87171;
            margin-top: 12px;
            text-align: center;
        }
        .auth-error-msg.visible { display: block; animation: authCardIn 0.3s ease; }
    </style>
</head>
<body class="auth-body">

    <!-- Auth Shield -->
    <div id="auth-shield">
        <div class="shield-logo">
            <i data-lucide="crown" size="48"></i>
        </div>
        <div class="loader-sync" style="padding:0; opacity:1;">
            <i data-lucide="loader-2" size="24" class="animate-spin" style="margin:0 auto;"></i>
            <span style="display:block; margin-top:12px; font-size:9px; letter-spacing:3px;">VERIFYING SESSION</span>
        </div>
    </div>

    <!-- Ambient blobs -->
    <div class="auth-blob auth-blob--gold"></div>
    <div class="auth-blob auth-blob--purple"></div>

    <div class="auth-card-premium">
        <!-- Header -->
        <div class="auth-crown-ring">
            <i data-lucide="crown" size="26"></i>
        </div>
        <h1 class="auth-brand">WorldModels<span>&Jobs</span></h1>
        <p class="auth-tagline">Premium Intelligence</p>

        <!-- Tabs -->
        <div class="auth-tabs-premium">
            <button id="tabSignIn" class="auth-tab-btn active">LOGIN</button>
            <button id="tabSignUp" class="auth-tab-btn">REGISTER</button>
        </div>

        <!-- Form -->
        <form id="authForm" autocomplete="on">
            <div class="auth-field">
                <label class="auth-label" for="email">Authorized Email</label>
                <input
                    type="email"
                    id="email"
                    class="auth-input"
                    required
                    placeholder="member@worldmodels.com"
                    autocomplete="email"
                >
            </div>
            <div class="auth-field">
                <label class="auth-label" for="password">Access Key</label>
                <input
                    type="password"
                    id="password"
                    class="auth-input"
                    required
                    placeholder="••••••••"
                    autocomplete="current-password"
                >
            </div>

            <div class="auth-error-msg" id="authError"></div>

            <button type="submit" id="submitBtn" class="auth-submit-btn">
                <i data-lucide="shield-check" size="14"></i>
                ESTABLISH CONNECTION
            </button>
        </form>

        <footer class="auth-footer-text">
            Encrypted Session &nbsp;·&nbsp; VIP Intelligence
        </footer>
    </div>

    <script type="module">
        import { initAuthUI } from './modules/auth/auth.ui.js';
        import { initAuth } from './services/user.service.js';
        
        lucide.createIcons();
        
        // Verificar sesión: si ya hay usuario → /dashboard.html
        initAuth(() => {
            const shield = document.getElementById('auth-shield');
            if (shield) {
                shield.classList.add('hidden');
                setTimeout(() => shield.remove(), 600);
            }
        });

        initAuthUI();
    </script>
</body>
</html>
