<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldModels Routing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:32px;width:100%;max-width:360px}
.logo{text-align:center;font-size:26px;font-weight:700;color:#c9a84c;margin-bottom:6px}
.sub{text-align:center;color:#666;font-size:13px;margin-bottom:24px}
.app{display:none;padding:16px;max-width:600px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 0 20px;border-bottom:1px solid #222;margin-bottom:20px}
.hdr h1{font-size:18px;color:#c9a84c}
.btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.bgold{background:#c9a84c;color:#000}
.bred{background:#c0392b;color:#fff}
.bgray{background:#333;color:#aaa}
.bsm{padding:6px 12px;font-size:12px;border-radius:8px}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#111;color:#fff;font-size:14px;margin-bottom:10px}
input:focus{outline:none;border-color:#c9a84c}
label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:12px}
.chdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.clbl{font-weight:700;font-size:15px;color:#c9a84c}
.cinf{font-size:12px;color:#666;margin-top:3px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{background:#222;border:1px solid #333;border-radius:6px;padding:3px 8px;font-size:11px;color:#aaa}
.tagc{border-color:#c9a84c44;color:#c9a84c}
.fsec{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:16px}
.ftitle{font-size:13px;font-weight:700;color:#666;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.citem{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #333;border-radius:8px;padding:8px 10px;cursor:pointer}
.citem input[type=checkbox]{width:auto;margin:0}
.citem label{margin:0;font-size:13px;color:#ccc;cursor:pointer}
.citem.sel{border-color:#c9a84c;background:#1a1500}
.st{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.stok{background:#0a2a0a;border:1px solid #1a5a1a;color:#4caf50;display:block}
.sterr{background:#2a0a0a;border:1px solid #5a1a1a;color:#f44;display:block}
.dim{opacity:0.5;pointer-events:none}
hr{border:none;border-top:1px solid #222;margin:20px 0}
</style>
</head>
<body>
<div class="login" id="LS">
  <div class="box">
    <div class="logo">WorldModels</div>
    <div class="sub">Routing Manager</div>
    <label>Contrasena</label>
    <input type="password" id="pw" placeholder="..." onkeydown="if(event.key==='Enter')login()">
    <button class="btn bgold" style="width:100%;margin-top:6px" onclick="login()">Entrar</button>
    <div id="lerr" style="color:#f44;font-size:13px;margin-top:10px;text-align:center"></div>
  </div>
</div>
<div class="app" id="AS">
  <div class="hdr">
    <h1>Routing Manager</h1>
    <button class="btn bgold bsm" onclick="showForm()">+ Nueva clienta</button>
  </div>
  <div id="st" class="st"></div>
  <div id="CL"></div>
  <hr>
  <div class="fsec" id="AF" style="display:none">
    <div class="ftitle" id="FT">Nueva Clienta</div>
    <input type="hidden" id="EID">
    <label>Nombre o Etiqueta</label>
    <input type="text" id="FL" placeholder="Ej: SOFIA_LONDON">
    <label>WhatsApp (numeros con prefijo pais)</label>
    <input type="tel" id="FW" placeholder="447XXXXXXXXX">
    <label>Telegram username (opcional)</label>
    <input type="text" id="FTG" placeholder="@username o vacio">
    <label>Ciudades que quiere recibir</label>
    <div class="cgrid" id="CG"></div>
    <label>Solo categoria (opcional, ej: evento)</label>
    <input type="text" id="FF" placeholder="Vacio = recibe todo">
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn bgold" style="flex:1" onclick="saveC()">Guardar y activar</button>
      <button class="btn bgray" style="flex:0.4" onclick="cancelF()">Cancelar</button>
    </div>
  </div>
</div>
<script>
var API='/api/routing',pw='',clients=[];
var CITIES={ibiza:'Ibiza',marbella:'Marbella / Costa Sol',madrid:'Madrid',monaco:'Monaco / Niza / Cannes',london:'Londres / UK',russia_turkey:'Rusia / Turquia / Baku',suiza:'Suiza',amsterdam:'Amsterdam',dubai:'Dubai',paris:'Paris',berlin:'Berlin / Munich',viena:'Viena',tel_aviv:'Tel Aviv'};
function login(){
  pw=document.getElementById('pw').value;
  fetch(API+'/clients',{headers:{'x-routing-password':pw}}).then(function(r){
    if(r.status===401){document.getElementById('lerr').textContent='Contrasena incorrecta';return;}
    r.json().then(function(d){clients=d;document.getElementById('LS').style.display='none';document.getElementById('AS').style.display='block';render();buildGrid();});
  }).catch(function(){document.getElementById('lerr').textContent='Error de conexion';});
}
function render(){
  var el=document.getElementById('CL');
  if(!clients.length){el.innerHTML='<p style="color:#555;text-align:center;padding:20px">Sin clientas configuradas</p>';return;}
  el.innerHTML=clients.map(function(c){
    return '<div class="card"><div class="chdr"><div><div class="clbl">'+c.label+'</div><div class="cinf">WA: +'+c.wa+(c.tg?' &middot; TG: '+c.tg:'')+'</div></div>'
      +'<div style="display:flex;gap:8px"><button class="btn bgray bsm" onclick="editC(\''+c.id+'\')">Editar</button>'
      +'<button class="btn bred bsm" onclick="delC(\''+c.id+'\')">Borrar</button></div></div>'
      +'<div class="tags">'+c.cities.map(function(x){return '<span class="tag tagc">'+(CITIES[x]||x)+'</span>';}).join('')
      +(c.categoryFilter?'<span class="tag">Solo: '+c.categoryFilter+'</span>':'<span class="tag">Todo</span>')+'</div></div>';
  }).join('');
}
function buildGrid(){
  document.getElementById('CG').innerHTML=Object.keys(CITIES).map(function(k){
    return '<div class="citem" id="cw_'+k+'" onclick="togC(\''+k+'\')"><input type="checkbox" id="cb_'+k+'"><label>'+CITIES[k]+'</label></div>';
  }).join('');
}
function togC(k){var cb=document.getElementById('cb_'+k);cb.checked=!cb.checked;document.getElementById('cw_'+k).className='citem'+(cb.checked?' sel':'');}
function showForm(){
  document.getElementById('EID').value='';document.getElementById('FL').value='';document.getElementById('FW').value='';
  document.getElementById('FTG').value='';document.getElementById('FF').value='';document.getElementById('FT').textContent='Nueva Clienta';
  Object.keys(CITIES).forEach(function(k){document.getElementById('cb_'+k).checked=false;document.getElementById('cw_'+k).className='citem';});
  var f=document.getElementById('AF');f.style.display='block';f.scrollIntoView({behavior:'smooth'});
}
function editC(id){
  var c=clients.find(function(x){return x.id===id;});if(!c)return;
  document.getElementById('EID').value=c.id;document.getElementById('FL').value=c.label;document.getElementById('FW').value=c.wa;
  document.getElementById('FTG').value=c.tg||'';document.getElementById('FF').value=c.categoryFilter||'';document.getElementById('FT').textContent='Editar Clienta';
  Object.keys(CITIES).forEach(function(k){var s=c.cities.indexOf(k)!==-1;document.getElementById('cb_'+k).checked=s;document.getElementById('cw_'+k).className='citem'+(s?' sel':'');});
  var f=document.getElementById('AF');f.style.display='block';f.scrollIntoView({behavior:'smooth'});
}
function cancelF(){document.getElementById('AF').style.display='none';}
function saveC(){
  var id=document.getElementById('EID').value;
  var label=document.getElementById('FL').value.trim().toUpperCase().replace(/\s+/g,'_');
  var wa=document.getElementById('FW').value.replace(/\D/g,'');
  var tg=document.getElementById('FTG').value.trim();
  var filt=document.getElementById('FF').value.trim();
  var cities=Object.keys(CITIES).filter(function(k){return document.getElementById('cb_'+k).checked;});
  if(!label||!wa||!cities.length){showSt('Rellena nombre, WhatsApp y al menos una ciudad',false);return;}
  var nc={id:id||(label+'_'+Date.now()),label:label,wa:wa,tg:tg,cities:cities,categoryFilter:filt};
  var updated=id?clients.map(function(c){return c.id===id?nc:c;}):[].concat(clients,[nc]);
  document.getElementById('AS').classList.add('dim');showSt('Guardando...',true,true);
  fetch(API+'/clients',{method:'POST',headers:{'Content-Type':'application/json','x-routing-password':pw},body:JSON.stringify(updated)})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){clients=updated;render();cancelF();showSt('Guardado y activado en n8n',true);}
      else showSt('Error: '+d.error,false);
      document.getElementById('AS').classList.remove('dim');
    }).catch(function(e){showSt('Error de red',false);document.getElementById('AS').classList.remove('dim');});
}
function delC(id){
  if(!confirm('Eliminar esta clienta?'))return;
  var updated=clients.filter(function(c){return c.id!==id;});
  fetch(API+'/clients',{method:'POST',headers:{'Content-Type':'application/json','x-routing-password':pw},body:JSON.stringify(updated)})
    .then(function(r){return r.json();}).then(function(d){if(d.ok){clients=updated;render();showSt('Eliminada',true);}else showSt('Error: '+d.error,false);});
}
function showSt(msg,ok,neutral){
  var el=document.getElementById('st');el.className='st '+(neutral?'':ok?'stok':'sterr');
  el.textContent=msg;el.style.display='block';if(!neutral)setTimeout(function(){el.style.display='none';},4000);
}
document.getElementById('pw').focus();
</script>
</body>
</html>
