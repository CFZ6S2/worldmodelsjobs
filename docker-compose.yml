version: '3.8'

services:
  redis:
    image: redis:6.2-alpine
    container_name: redis
    restart: always
    networks:
      - worldmodels-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    # Port 5678 is now only bound to localhost to prevent direct external access.
    # Nginx should be used as a reverse proxy for external traffic.
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_API_ENABLED=true
      - N8N_RELOAD_CONFIG_AFTER_IMPORT=true
      - GENERIC_TIMEZONE=Europe/Madrid
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_SECURE_COOKIE=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - worldmodels-net
    depends_on:
      - redis

  telegram-collector:
    image: telegram-collector:latest
    container_name: telegram-collector
    restart: always
    build: 
      context: ./collectors/telegram
    environment:
      - WEBHOOK_URL=http://n8n:5678/webhook/worldmodelsjobs-lead
      - BACKEND_URL=${BACKEND_INTERNAL_URL:-http://host.docker.internal:3001/api/check-duplicate}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    networks:
      - worldmodels-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - n8n

  whatsapp-collector:
    image: whatsapp-collector:latest
    container_name: whatsapp-collector
    restart: always
    build:
      context: ./collectors/whatsapp
    environment:
      - WEBHOOK_URL=http://n8n:5678/webhook/worldmodelsjobs-lead
    volumes:
      - ./collectors/whatsapp/auth:/app/.wwebjs_auth
    networks:
      - worldmodels-net
    depends_on:
      - n8n

  cleaner:
    image: cleaner:latest
    container_name: cleaner
    build: ./cleaner
    environment:
      - RETENTION_HOURS=48
    volumes:
      - n8n_data:/app/n8n_data
    networks:
      - worldmodels-net
    depends_on:
      - n8n

networks:
  worldmodels-net:
    driver: bridge

volumes:
  n8n_data:
