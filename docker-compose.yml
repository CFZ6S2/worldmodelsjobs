version: '3.8'

services:
  redis:
    image: redis:6.2-alpine
    container_name: redis
    restart: always
    networks:
      - worldmodels-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    # Port 5678 is now only bound to localhost to prevent direct external access.
    # Nginx should be used as a reverse proxy for external traffic.
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_API_ENABLED=true
      - N8N_RELOAD_CONFIG_AFTER_IMPORT=true
      - GENERIC_TIMEZONE=Europe/Madrid
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_SECURE_COOKIE=false
      - N8N_PATH=${N8N_PATH}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_COOKIES_SAMESITE=${N8N_COOKIES_SAMESITE:-lax}
      - N8N_TRUST_PROXY=${N8N_TRUST_PROXY:-1}
      - N8N_USER_MANAGEMENT_DISABLED=${N8N_USER_MANAGEMENT_DISABLED:-false}
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/versions:/home/node/n8n_versions
    networks:
      - worldmodels-net
    depends_on:
      - redis

  telegram-collector:
    image: telegram-collector:latest
    container_name: telegram-collector
    restart: always
    build: 
      context: ./collectors/telegram
    environment:
      - WEBHOOK_URL=http://n8n:5678/n8n/webhook/telegram-wm-2024
      - BACKEND_URL=${BACKEND_INTERNAL_URL:-http://host.docker.internal:3001/api/check-duplicate}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - TELEGRAM_2FA_PASSWORD=${TELEGRAM_2FA_PASSWORD}
      - TELEGRAM_TARGET_CHAT_IDS=${TELEGRAM_TARGET_CHAT_IDS}
      - TELEGRAM_BANNED_USERNAMES=${TELEGRAM_BANNED_USERNAMES}
    volumes:
      - telegram_sessions:/sessions
    networks:
      - worldmodels-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - n8n

  cleaner:
    image: cleaner:latest
    container_name: cleaner
    build: ./cleaner
    environment:
      - RETENTION_HOURS=48
    volumes:
      - n8n_data:/app/n8n_data
    networks:
      - worldmodels-net
    depends_on:
      - n8n

networks:
  worldmodels-net:
    driver: bridge

volumes:
  n8n_data:
  telegram_sessions:
    name: worldmodels-jobs_telegram_sessions
    external: true
